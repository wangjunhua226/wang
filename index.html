<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>北斗四代户户通寻星</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #1a1a2e; color: #eee;
            font-family: system-ui, sans-serif;
            text-align: center;
            min-height: 100vh;
        }
        #wechatTip {
            display: none;
            position: fixed; top:0; left:0; width:100%;
            background:#000; color:#fff; z-index:9999;
            padding:15px; text-align:center; font-size:16px;
            line-height:1.6;
        }
        #wechatTip button {
            margin-top:8px; background:#e74c3c; color:white;
            border:none; padding:8px 20px; border-radius:20px;
            font-size:14px; cursor:pointer;
        }
        #cover {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100%;
            padding: 20px;
        }
        #cover h1 {
            font-size: 2.5rem; margin-bottom: 20px;
            color: #f0c040; letter-spacing: 2px;
        }
        #cover .btn-group {
            display: flex; flex-direction: column;
            gap: 15px; width: 80%; max-width: 280px;
        }
        #cover button {
            border: none; padding: 18px 0;
            border-radius: 30px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        #cover button.start {
            background: #4ecdc4; color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(78,205,196,0.4);
        }
        #cover button.video {
            background: transparent; color: #aaa;
            border: 2px solid #aaa;
        }
        #cover p {
            color: #888; margin: 15px 0 0;
            font-size: 0.9rem;
        }
        #mainApp {
            display: none; flex-direction: column;
            align-items: center; padding: 10px;
        }
        #info {
            font-size: 0.9rem; margin: 5px 0;
            background: rgba(255,255,255,0.1);
            padding: 8px; border-radius: 10px; width: 100%;
        }
        #direction {
            font-size: 1.1rem; color: #4ecdc4; margin: 5px;
        }
        canvas {
            display: block; margin: 10px auto;
            width: 90vw; height: 90vw;
            max-width: 400px; max-height: 400px;
        }
        #hint {
            font-size: 1rem; font-weight: bold;
            color: #f0c040; margin: 5px;
        }
        button.permission {
            background: #e76f51; color: white;
            border: none; padding: 12px 20px;
            border-radius: 25px; font-size: 1rem;
            margin: 8px;
        }
    </style>
</head>
<body>
    <div id="wechatTip">
        ⚠️ 微信内无法使用指南针 <br>
        请点击右上角 <span style="font-size:20px;">···</span> → <strong>在浏览器打开</strong>
        <br><button onclick="document.getElementById('wechatTip').style.display='none'">知道了</button>
    </div>

    <div id="cover">
        <h1>🛰️ 寻星仪</h1>
        <div class="btn-group">
            <button class="start" onclick="startApp()">📡 开始寻星</button>
            <button class="video" onclick="alert('视频教程功能待开发，敬请期待！')">🎬 视频教程（待开发）</button>
        </div>
        <p>请到室外开阔处，点击上方按钮</p >
    </div>

    <div id="mainApp">
        <div id="info">📍 正在获取位置和方向...</div>
        <div id="direction">🧭 手机指向：--</div>
        <canvas id="compass" width="400" height="400"></canvas>
        <div id="hint">🛰️ 等待数据...</div>
        <button class="permission" onclick="requestPermission()">🔐 重新授权传感器 (iOS需点此)</button>
    </div>

    <script>
        (function() {
            if(navigator.userAgent.indexOf('MicroMessenger') !== -1) {
                document.getElementById('wechatTip').style.display = 'block';
            }
        })();

        const SAT_LON = 130.0;
        const SAT_NAME = "北斗四代户户通";
        
        let userLat = null, userLon = null;
        let satAzimuth = 0, satElevation = 0;
        let deviceHeading = 0;
        let permissionGranted = false;
        let appStarted = false;

        const canvas = document.getElementById('compass');
        const ctx = canvas.getContext('2d');
        const infoDiv = document.getElementById('info');
        const hintDiv = document.getElementById('hint');
        const dirDiv = document.getElementById('direction');

        function startApp() {
            document.getElementById('cover').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            appStarted = true;
            getLocation();
            requestPermission();
            setInterval(() => {
                if (appStarted && userLat && userLon) {
                    drawCompass();
                }
            }, 200);
        }

        function calcAngles(lat, lon, satLon) {
            const toRad = Math.PI / 180, toDeg = 180 / Math.PI;
            const latRad = lat * toRad, deltaLon = (lon - satLon) * toRad;
            let az = Math.atan2(Math.sin(deltaLon), Math.cos(latRad) * Math.tan(0) - Math.sin(latRad) * Math.cos(deltaLon)) * toDeg;
            if (az < 0) az += 360;
            const r = 6371, R = 42164;
            const cosLat = Math.cos(latRad), cosDelta = Math.cos(deltaLon);
            const distance = Math.sqrt(r*r + R*R - 2*r*R*cosLat*cosDelta);
            const el = Math.asin((R*R - r*r - distance*distance) / (2*r*distance)) * toDeg;
            return { azimuth: az, elevation: el };
        }

        function getDirectionText(degrees) {
            const dirs = ['北','东北','东','东南','南','西南','西','西北'];
            return dirs[Math.round(degrees / 45) % 8];
        }

        function getLocation() {
            if (!navigator.geolocation) { infoDiv.textContent = '❌ 浏览器不支持GPS'; return; }
            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;
                updateSatData();
                infoDiv.textContent = `📍 纬:${userLat.toFixed(4)} 经:${userLon.toFixed(4)}`;
            }, () => {
                userLat = 33.7521; userLon = 114.8677;
                updateSatData();
                infoDiv.textContent = `📍 演示坐标 纬:${userLat} 经:${userLon}`;
            }, { enableHighAccuracy: true });
        }

        function updateSatData() {
            if (!userLat || !userLon) return;
            const res = calcAngles(userLat, userLon, SAT_LON);
            satAzimuth = res.azimuth; satElevation = res.elevation;
            // 只显示方位角，不显示仰角
            hintDiv.textContent = `🛰️ 方位角 ${satAzimuth.toFixed(1)}°`;
        }

        function handleOrientation(event) {
            if (!permissionGranted || !appStarted) return;
            if (event.webkitCompassHeading !== undefined) {
                deviceHeading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                deviceHeading = (360 - event.alpha) % 360;
            }
            dirDiv.textContent = `🧭 手机指向：${deviceHeading.toFixed(1)}° (${getDirectionText(deviceHeading)})`;
            drawCompass();
        }

        function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        permissionGranted = true;
                        window.addEventListener('deviceorientation', handleOrientation);
                        infoDiv.textContent = '✅ 传感器已授权';
                    }
                }).catch(() => { infoDiv.textContent = '⚠️ 权限请求错误'; });
            } else {
                permissionGranted = true;
                window.addEventListener('deviceorientation', handleOrientation);
                infoDiv.textContent = '✅ 传感器已启动';
            }
        }

        function drawCompass() {
            const w = canvas.width, h = canvas.height;
            const cx = w/2, cy = h/2;
            const radius = Math.min(w, h) * 0.42;
            ctx.clearRect(0, 0, w, h);
            
            // 底盘背景
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#16213e';
            ctx.fill();
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 3;
            ctx.stroke();

            // ----- 1. 旋转的刻度与卫星指针（底盘旋转） -----
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(-deviceHeading * Math.PI / 180);
            
            // 刻度线
            for (let i = 0; i < 360; i += 5) {
                const rad = i * Math.PI / 180;
                const x1 = (radius - 5) * Math.sin(rad);
                const y1 = -(radius - 5) * Math.cos(rad);
                const x2 = (radius - 20) * Math.sin(rad);
                const y2 = -(radius - 20) * Math.cos(rad);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = i % 15 === 0 ? '#f0c040' : '#555';
                ctx.lineWidth = i % 15 === 0 ? 2 : 1;
                ctx.stroke();
            }

            // 卫星指针（从中心指向卫星方向，像闹钟指针）
            const satRad = satAzimuth * Math.PI / 180;
            const pointerEndX = (radius - 5) * Math.sin(satRad);    // 指针末端靠近外圈
            const pointerEndY = -(radius - 5) * Math.cos(satRad);
            
            // 画指针线（金色粗线）
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(pointerEndX, pointerEndY);
            ctx.strokeStyle = '#f0c040';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // 指针末端画一个小三角箭头
            const angle = satRad;
            const arrowSize = 10;
            ctx.beginPath();
            ctx.moveTo(pointerEndX, pointerEndY);
            ctx.lineTo(
                pointerEndX - arrowSize * Math.sin(angle - 0.6),
                pointerEndY + arrowSize * Math.cos(angle - 0.6)
            );
            ctx.lineTo(
                pointerEndX - arrowSize * Math.sin(angle + 0.6),
                pointerEndY + arrowSize * Math.cos(angle + 0.6)
            );
            ctx.closePath();
            ctx.fillStyle = '#f0c040';
            ctx.fill();

            // 卫星图标画在指针末端稍外
            const iconOffset = 18;  // 把图标再往外推一点
            const iconX = (radius - 5 + iconOffset) * Math.sin(satRad);
            const iconY = -(radius - 5 + iconOffset) * Math.cos(satRad);
            ctx.font = '24px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🛰️', iconX, iconY);
            
            ctx.restore();

            // ----- 2. 不旋转的方向文字（始终正对用户） -----
            const dirs = [
                { a: 0, l: '北' },
                { a: 45, l: '东北' },
                { a: 90, l: '东' },
                { a: 135, l: '东南' },
                { a: 180, l: '南' },
                { a: 225, l: '西南' },
                { a: 270, l: '西' },
                { a: 315, l: '西北' }
            ];
            ctx.font = 'bold 14px system-ui';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            dirs.forEach(d => {
                // 计算该方向在屏幕上应出现的位置（相对于手机指向）
                const screenAngle = (d.a - deviceHeading) * Math.PI / 180;
                const textRadius = radius - 30;
                const tx = cx + textRadius * Math.sin(screenAngle);
                const ty = cy - textRadius * Math.cos(screenAngle);
                ctx.fillText(d.l, tx, ty);
            });

            // ----- 3. 固定的红色手机指向标记（正上方） -----
            ctx.beginPath();
            ctx.moveTo(cx, cy - radius + 5);
            ctx.lineTo(cx - 12, cy - radius - 15);
            ctx.lineTo(cx + 12, cy - radius - 15);
            ctx.closePath();
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 中心圆点
            ctx.beginPath();
            ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // ----- 4. 对准检测 -----
            let diff = satAzimuth - deviceHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            const absDiff = Math.abs(diff);
            ctx.font = '16px system-ui';
            ctx.fillStyle = '#4ecdc4';
            ctx.fillText(`差 ${absDiff.toFixed(1)}°`, cx, cy + 35);
            ctx.font = 'bold 14px system-ui';
            ctx.fillStyle = '#fff';
            ctx.fillText(absDiff < 3 ? '✅ 已对准！' : (diff > 0 ? '👉 向右转' : '👈 向左转'), cx, cy + 55);

            if (absDiff < 3) {
                document.body.style.backgroundColor = '#1b3b1b';
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 800;
                    gain.gain.value = 0.1;
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.12);
                } catch (e) {}
            } else {
                document.body.style.backgroundColor = '#1a1a2e';
            }
        }
    </script>
</body>
</html>
