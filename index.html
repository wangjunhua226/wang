<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>正版广电授权户户通寻星</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #1a1a2e; color: #eee;
            font-family: system-ui, sans-serif;
            text-align: center;
            min-height: 100vh;
        }

        /* 微信提示条 */
        #wechatTip {
            display: none;
            position: fixed; top:0; left:0; width:100%;
            background:#000; color:#fff; z-index:9999;
            padding: 8px 10px;
            text-align:center; font-size:13px;
            line-height:1.4;
        }
        #wechatTip button {
            margin-top:4px; background:#e74c3c; color:white;
            border:none; padding:6px 16px; border-radius:16px;
            font-size:12px; cursor:pointer;
        }

        /* 通用页面布局 */
        .page {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; width: 100%;
            padding: 20px;
        }
        .page h1 {
            font-size: 2.2rem; margin-bottom: 20px;
            color: #f0c040; letter-spacing: 2px;
        }
        #homePage h1 {
            margin-top: -30px;
        }
        .page .btn-group {
            display: flex; flex-direction: column;
            gap: 15px; width: 80%; max-width: 300px;
        }
        .page button {
            border: none; padding: 18px 0;
            border-radius: 30px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .page button.primary {
            background: #4ecdc4; color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(78,205,196,0.4);
        }
        .page button.back {
            background: transparent; color: #888;
            border: 1px solid #555;
            margin-top: 20px; padding: 10px 0;
            font-size: 1rem;
        }
        .page p.hint {
            color: #888; margin: 15px 0 0;
            font-size: 0.9rem;
        }

        /* 视频弹窗 */
        #videoModal {
            display: none;
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index:10000;
            justify-content: center; align-items: center; flex-direction: column;
        }
        #videoModal .close-btn {
            position: absolute; top: 10px; right: 25px;
            font-size: 35px; color: white; cursor: pointer; z-index:10001;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            width: 90%;
            max-width: 600px;
        }
        .video-container iframe {
            position: absolute; top:0; left:0;
            width: 100%; height: 100%;
        }

        /* 寻星主界面 */
        #mainApp {
            display: none; flex-direction: column;
            align-items: center; padding: 10px;
        }
        #info {
            font-size: 0.9rem; margin: 5px 0;
            background: rgba(255,255,255,0.1);
            padding: 8px; border-radius: 10px; width: 100%;
            margin-top: 20px;
        }
        #direction {
            font-size: 1.1rem; color: #4ecdc4; margin: 5px;
        }
        canvas {
            display: block; margin: 10px auto;
            width: 90vw; height: 90vw;
            max-width: 400px; max-height: 400px;
            margin-top: 50px;
        }
        #hint {
            font-size: 1rem; font-weight: bold;
            color: #f0c040; margin: 5px;
        }
        button.permission {
            background: #e76f51; color: white;
            border: none; padding: 12px 20px;
            border-radius: 25px; font-size: 1rem;
            margin: 8px;
        }
    </style>
</head>
<body>

    <div id="wechatTip">
        ⚠️ 微信内无法使用指南针 <br>
        请点击右上角 <span style="font-size:18px;">···</span> → <strong>在浏览器打开</strong>
        <br><button onclick="document.getElementById('wechatTip').style.display='none'">知道了</button>
    </div>

    <!-- ==================== 首页 ==================== -->
    <div id="homePage" class="page">
        <h1>📡 正版广电授权户户通</h1>
        <div class="btn-group">
            <button class="primary" onclick="startApp()">📡 寻星仪</button>
            <button class="primary" onclick="showTutorial()">📺 安装教程</button>
            <button class="primary" onclick="openShop()">🛒 购买设备</button>
        </div>
        <p class="hint">请到室外开阔处，点击上方按钮</p >
    </div>

    <!-- ==================== 教程页 ==================== -->
    <div id="tutorialPage" class="page" style="display:none;">
        <h1>📺 安装教程</h1>
        <div class="btn-group">
            <button class="primary" onclick="openVideo('install')">📡 小锅盖安装教程</button>
            <button class="primary" onclick="openVideo('connect')">🔌 设备连接教程</button>
            <button class="primary" onclick="openVideo('signal')">📶 调信号视频</button>
        </div>
        <button class="back" onclick="goHome()">← 返回首页</button>
    </div>

    <!-- ==================== 视频弹窗 ==================== -->
    <div id="videoModal">
        <span class="close-btn" onclick="closeVideo()">&times;</span>
        <div class="video-container">
            <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <!-- ==================== 寻星主界面 ==================== -->
    <div id="mainApp">
        <div id="info">📍 正在获取位置和方向...</div>
        <div id="direction">🧭 手机指向：--</div>
        <canvas id="compass" width="400" height="400"></canvas>
        <div id="hint">🛰️ 等待数据...</div>
        <button class="permission" onclick="requestPermission()">🔐 重新授权传感器 (iOS需点此)</button>
        <button class="back" onclick="goHomeFromApp()" style="display:block; margin-top:15px;">← 返回首页</button>
    </div>

    <script>
        (function() {
            if(navigator.userAgent.indexOf('MicroMessenger') !== -1) {
                document.getElementById('wechatTip').style.display = 'block';
            }
        })();

        function showTutorial() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('tutorialPage').style.display = 'flex';
        }
        function goHome() {
            document.getElementById('tutorialPage').style.display = 'none';
            document.getElementById('homePage').style.display = 'flex';
        }
        function goHomeFromApp() {
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('homePage').style.display = 'flex';
            appStarted = false;
            document.body.style.backgroundColor = '#1a1a2e';
        }

        // ===== 购买链接（拼多多已填入） =====
        function openShop() {
            var shopUrl = "https://mobile.yangkeduo.com/goods2.html?ps=H32WsjVb0X";
            window.open(shopUrl, '_blank');
        }

        // ===== 视频播放 =====
        function openVideo(type) {
            var bvid = "";
            if (type === 'install') {
                bvid = "BV1y65p65Ev3";   // 小锅盖安装视频
            } else if (type === 'connect') {
                bvid = "YOUR_CONNECT_BVID";   // 设备连接视频（待补充）
            } else if (type === 'signal') {
                bvid = "BV1rm5p6zEuB";   // 调信号视频
            }
            var videoUrl = "https://player.bilibili.com/player.html?bvid=" + bvid;
            document.getElementById('videoPlayer').src = videoUrl;
            document.getElementById('videoModal').style.display = 'flex';
        }
        function closeVideo() {
            document.getElementById('videoPlayer').src = "";
            document.getElementById('videoModal').style.display = 'none';
        }

        // ===== 卫星参数（中星9号 92.2°E） =====
        const SAT_LON = 92.2;
        const SAT_NAME = "中星9号";
        let userLat = null, userLon = null;
        let satAzimuth = 0, satElevation = 0;
        let deviceHeading = 0;
        let permissionGranted = false;
        let appStarted = false;

        const canvas = document.getElementById('compass');
        const ctx = canvas.getContext('2d');
        const infoDiv = document.getElementById('info');
        const hintDiv = document.getElementById('hint');
        const dirDiv = document.getElementById('direction');

        function startApp() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('tutorialPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            appStarted = true;
            getLocation();
            requestPermission();
            setInterval(() => {
                if (appStarted && userLat && userLon) drawCompass();
            }, 200);
        }

        function calcAngles(lat, lon, satLon) {
            const toRad = Math.PI / 180, toDeg = 180 / Math.PI;
            const latRad = lat * toRad, deltaLon = (lon - satLon) * toRad;
            let az = Math.atan2(Math.sin(deltaLon), Math.cos(latRad) * Math.tan(0) - Math.sin(latRad) * Math.cos(deltaLon)) * toDeg;
            if (az < 0) az += 360;
            const r = 6371, R = 42164;
            const cosLat = Math.cos(latRad), cosDelta = Math.cos(deltaLon);
            const distance = Math.sqrt(r*r + R*R - 2*r*R*cosLat*cosDelta);
            const el = Math.asin((R*R - r*r - distance*distance) / (2*r*distance)) * toDeg;
            return { azimuth: az, elevation: el };
        }

        function getDirectionText(degrees) {
            const dirs = ['北','东北','东','东南','南','西南','西','西北'];
            return dirs[Math.round(degrees / 45) % 8];
        }

        function getLocation() {
            if (!navigator.geolocation) { infoDiv.textContent = '❌ 浏览器不支持GPS'; return; }
            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;
                updateSatData();
                infoDiv.textContent = `📍 纬:${userLat.toFixed(4)} 经:${userLon.toFixed(4)}`;
            }, () => {
                userLat = 33.7521; userLon = 114.8677;
                updateSatData();
                infoDiv.textContent = `📍 演示坐标 纬:${userLat} 经:${userLon}`;
            }, { enableHighAccuracy: true });
        }

        function updateSatData() {
            if (!userLat || !userLon) return;
            const res = calcAngles(userLat, userLon, SAT_LON);
            satAzimuth = res.azimuth; satElevation = res.elevation;
            hintDiv.textContent = `🛰️ 中星9号 方位角 ${satAzimuth.toFixed(1)}°`;
        }

        function handleOrientation(event) {
            if (!permissionGranted || !appStarted) return;
            if (event.webkitCompassHeading !== undefined) {
                deviceHeading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                deviceHeading = (360 - event.alpha) % 360;
            }
            dirDiv.textContent = `🧭 手机指向：${deviceHeading.toFixed(1)}° (${getDirectionText(deviceHeading)})`;
            drawCompass();
        }

        function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        permissionGranted = true;
                        window.addEventListener('deviceorientation', handleOrientation);
                        infoDiv.textContent = '✅ 传感器已授权';
                    }
                }).catch(() => { infoDiv.textContent = '⚠️ 权限请求错误'; });
            } else {
                permissionGranted = true;
                window.addEventListener('deviceorientation', handleOrientation);
                infoDiv.textContent = '✅ 传感器已启动';
            }
        }

        function drawCompass() {
            const w = canvas.width, h = canvas.height;
            const cx = w/2, cy = h/2;
            const radius = Math.min(w, h) * 0.42;
            ctx.clearRect(0, 0, w, h);

            ctx.beginPath();
            ctx.arc(cx, cy, radius + 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#16213e';
            ctx.fill();
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(-deviceHeading * Math.PI / 180);
            for (let i = 0; i < 360; i += 5) {
                const rad = i * Math.PI / 180;
                const x1 = (radius - 5) * Math.sin(rad);
                const y1 = -(radius - 5) * Math.cos(rad);
                const x2 = (radius - 20) * Math.sin(rad);
                const y2 = -(radius - 20) * Math.cos(rad);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = i % 15 === 0 ? '#f0c040' : '#555';
                ctx.lineWidth = i % 15 === 0 ? 2 : 1;
                ctx.stroke();
            }
            ctx.restore();

            const dirs = [
                { a: 0, l: '北' }, { a: 45, l: '东北' },
                { a: 90, l: '东' }, { a: 135, l: '东南' },
                { a: 180, l: '南' }, { a: 225, l: '西南' },
                { a: 270, l: '西' }, { a: 315, l: '西北' }
            ];
            ctx.font = 'bold 14px system-ui';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            dirs.forEach(d => {
                const screenAngle = (d.a - deviceHeading) * Math.PI / 180;
                const textRadius = radius - 30;
                const tx = cx + textRadius * Math.sin(screenAngle);
                const ty = cy - textRadius * Math.cos(screenAngle);
                ctx.fillText(d.l, tx, ty);
            });

            const satScreenAngle = (satAzimuth - deviceHeading) * Math.PI / 180;
            const satScreenX = cx + (radius - 10) * Math.sin(satScreenAngle);
            const satScreenY = cy - (radius - 10) * Math.cos(satScreenAngle);

            const pointerLength = radius * 0.5;
            const pointerEndX = cx;
            const pointerEndY = cy - pointerLength;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(pointerEndX, pointerEndY);
            ctx.strokeStyle = '#f0c040';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(pointerEndX, pointerEndY);
            ctx.lineTo(pointerEndX - 8, pointerEndY + 14);
            ctx.lineTo(pointerEndX + 8, pointerEndY + 14);
            ctx.closePath();
            ctx.fillStyle = '#f0c040';
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(satScreenX, satScreenY - 16);
            ctx.lineTo(satScreenX - 12, satScreenY + 8);
            ctx.lineTo(satScreenX + 12, satScreenY + 8);
            ctx.closePath();
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.font = '44px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('🛰️', satScreenX, satScreenY - 18);

            ctx.beginPath();
            ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = '#16213e';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.font = 'bold 9px system-ui';
            ctx.fillStyle = '#16213e';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('手机', cx, cy);

            let diff = satAzimuth - deviceHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            const absDiff = Math.abs(diff);
            ctx.font = '16px system-ui';
            ctx.fillStyle = '#4ecdc4';
            ctx.fillText(`差 ${absDiff.toFixed(1)}°`, cx, cy + 35);
            ctx.font = 'bold 14px system-ui';
            ctx.fillStyle = '#fff';
            ctx.fillText(absDiff < 3 ? '✅ 已对准！' : (diff > 0 ? '👉 向右转' : '👈 向左转'), cx, cy + 55);

            if (absDiff < 3) {
                document.body.style.backgroundColor = '#1b3b1b';
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 800;
                    gain.gain.value = 0.1;
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.12);
                } catch (e) {}
            } else {
                document.body.style.backgroundColor = '#1a1a2e';
            }
        }
    </script>
</body>
</html>
```
